socsim-engine = { path = "../socsim-engine" }
socsim-log    = { path = "../socsim-log" }
serde.workspace      = true
serde_json.workspace = true
rayon.workspace      = true

[dev-dependencies]
socsim-packs = { path = "../socsim-packs", features = ["hr-lifecycle"] }
