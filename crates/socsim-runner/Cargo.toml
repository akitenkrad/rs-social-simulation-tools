[package]
name        = "socsim-runner"
description = "Trial management, multi-seed runs, and parameter sweeps for socsim"
edition.workspace = true
version.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
socsim-core   = { path = "../socsim-core" }
