<svg width="100%" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Two usage paths: scenario-CLI vs. library mode</title>
<desc>Two parallel, first-class paths share one engine. The scenario/CLI lane flows ModulePack into Registry, a scenario .toml, socsim-runner, and the socsim binary. The library-mode lane has the researcher build their own WorldState and Mechanisms, pass them to SimulationBuilder, then drive with run, run_until or run_observed using a bring-your-own recorder that defaults to NullRecorder; library mode optionally uses socsim-llm in the Decision phase and socsim-results for output. Both lanes share the same engine and determinism guarantees.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="gr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="994" height="514" rx="20" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<text class="title" x="40" y="48" font-size="23" fill="#2C2C2A">Two usage paths — both first-class</text>
<text class="body"  x="40" y="73" font-size="13" fill="#6B6A64">Same engine, same determinism guarantees; choose per project.</text>

<!-- ===== Lane A: scenario / CLI ===== -->
<rect x="38" y="92" width="924" height="158" rx="14" fill="#FBFAF6" stroke="#534AB7" stroke-width="1.4"/>
<text class="title" x="58" y="118" font-size="14" fill="#534AB7">Lane A — Scenario-TOML / CLI</text>
<text class="body" x="58" y="136" font-size="10.5" fill="#6B6A64">reproducible scenario files · parameter sweeps</text>

<g class="mono" font-size="12">
  <rect x="58"  y="160" width="150" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="133" y="186" fill="#332E6E" text-anchor="middle">ModulePack</text>
  <rect x="248" y="160" width="150" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="323" y="186" fill="#332E6E" text-anchor="middle">Registry</text>
  <rect x="438" y="160" width="160" height="44" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="518" y="186" fill="#3C3B37" text-anchor="middle">scenario .toml</text>
  <rect x="638" y="160" width="160" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="718" y="186" fill="#332E6E" text-anchor="middle">socsim-runner</text>
  <rect x="838" y="160" width="106" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text x="891" y="186" fill="#332E6E" text-anchor="middle" font-weight="700">socsim</text>
</g>
<g stroke="#534AB7" stroke-width="1.4" fill="none">
  <path d="M208 182 H246" marker-end="url(#hr)"/>
  <path d="M398 182 H436" marker-end="url(#hr)"/>
  <path d="M598 182 H636" marker-end="url(#hr)"/>
  <path d="M798 182 H836" marker-end="url(#hr)"/>
</g>
<text class="body" x="891" y="222" font-size="10" fill="#9A988F" text-anchor="middle">binary</text>

<!-- ===== Lane B: library mode ===== -->
<rect x="38" y="268" width="924" height="226" rx="14" fill="#FBFAF6" stroke="#0F6E56" stroke-width="1.4"/>
<text class="title" x="58" y="294" font-size="14" fill="#0F6E56">Lane B — Library mode</text>
<text class="body" x="58" y="312" font-size="10.5" fill="#6B6A64">embed the engine · custom output schemas · self-contained CA / lattice models</text>

<g class="mono" font-size="12">
  <rect x="58"  y="332" width="180" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text x="148" y="356" fill="#0B5040" text-anchor="middle" font-weight="700">your WorldState</text>
  <text class="body" x="148" y="374" font-size="10.5" fill="#3C7E6C" text-anchor="middle">+ your Mechanisms</text>

  <rect x="288" y="332" width="170" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="373" y="356" fill="#332E6E" text-anchor="middle" font-weight="700">SimulationBuilder</text>
  <text class="body" x="373" y="374" font-size="10.5" fill="#6B6A64" text-anchor="middle">add mechanisms</text>

  <rect x="508" y="332" width="200" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="608" y="356" fill="#332E6E" text-anchor="middle">run / run_until</text>
  <text x="608" y="374" fill="#332E6E" text-anchor="middle">run_observed</text>

  <rect x="758" y="332" width="186" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
  <text x="851" y="356" fill="#3C3B37" text-anchor="middle">recorder (BYO)</text>
  <text class="body" x="851" y="374" font-size="10.5" fill="#6B6A64" text-anchor="middle">default: NullRecorder</text>
</g>
<g stroke="#534AB7" stroke-width="1.4" fill="none">
  <path d="M238 360 H286" marker-end="url(#hr)"/>
  <path d="M458 360 H506" marker-end="url(#hr)"/>
  <path d="M708 360 H756" marker-end="url(#hr)"/>
</g>

<!-- optional helpers -->
<text class="body" x="58" y="424" font-size="11" fill="#444441" font-weight="600">Optional in library mode:</text>
<rect x="234" y="410" width="240" height="40" rx="10" fill="#FBFAF6" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="6 4"/>
<text class="mono" x="354" y="430" font-size="11.5" fill="#332E6E" text-anchor="middle">socsim-llm</text>
<text class="body" x="354" y="444" font-size="9.5" fill="#6B6A64" text-anchor="middle">Decision-phase LLM agents</text>

<rect x="498" y="410" width="240" height="40" rx="10" fill="#FBFAF6" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="6 4"/>
<text class="mono" x="618" y="430" font-size="11.5" fill="#0B5040" text-anchor="middle">socsim-results</text>
<text class="body" x="618" y="444" font-size="9.5" fill="#3C7E6C" text-anchor="middle">run dirs · CSV/JSON output</text>

<text class="body" x="822" y="436" font-size="10.5" fill="#9A988F" text-anchor="middle">both share the same</text>
<text class="body" x="822" y="452" font-size="10.5" fill="#9A988F" text-anchor="middle">engine &amp; determinism</text>

</svg>
