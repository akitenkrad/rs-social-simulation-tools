<svg width="100%" viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>socsim core abstractions and ownership</title>
<desc>Researchers implement four traits (WorldState, Mechanism, Scheduler, Recorder). The Simulation engine owns one world, a list of mechanisms, a scheduler, a SimRng, a recorder, a scratch blackboard, and a stop flag. For each mechanism call the engine builds a StepContext bundling borrows and passes it to Mechanism::apply.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="994" height="574" rx="20" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<text class="title" x="40" y="48" font-size="24" fill="#2C2C2A">Core abstractions &amp; ownership</text>

<!-- left: traits you implement -->
<text class="body" x="40" y="92" font-size="14" fill="#0F6E56" font-weight="700">Traits you implement</text>
<g>
  <rect x="40" y="104" width="300" height="70" rx="11" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="mono"  x="56" y="128" font-size="14" fill="#0B5040">WorldState</text>
  <text class="body"  x="56" y="148" font-size="11.5" fill="#3C7E6C">shared mutable environment:</text>
  <text class="body"  x="56" y="164" font-size="11.5" fill="#3C7E6C">agents · SimClock · domain state</text>

  <rect x="40" y="184" width="300" height="70" rx="11" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="mono"  x="56" y="208" font-size="14" fill="#0B5040">Mechanism&lt;W&gt;</text>
  <text class="body"  x="56" y="228" font-size="11.5" fill="#3C7E6C">a unit of logic; declares phases();</text>
  <text class="body"  x="56" y="244" font-size="11.5" fill="#3C7E6C">runs in apply() — the "layer"</text>

  <rect x="40" y="264" width="300" height="70" rx="11" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="mono"  x="56" y="288" font-size="14" fill="#0B5040">Scheduler&lt;W&gt;</text>
  <text class="body"  x="56" y="308" font-size="11.5" fill="#3C7E6C">per-step agent activation order</text>
  <text class="body"  x="56" y="324" font-size="11.5" fill="#3C7E6C">(Sequential / RandomActivation)</text>

  <rect x="40" y="344" width="300" height="70" rx="11" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="mono"  x="56" y="368" font-size="14" fill="#0B5040">Recorder</text>
  <text class="body"  x="56" y="388" font-size="11.5" fill="#3C7E6C">sink for metrics &amp; events</text>
  <text class="body"  x="56" y="404" font-size="11.5" fill="#3C7E6C">(NullRecorder · JSONL · CSV)</text>
</g>

<!-- right: Simulation owns -->
<rect x="600" y="104" width="360" height="310" rx="13" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text class="mono" x="620" y="134" font-size="15" fill="#332E6E">Simulation&lt;W&gt;  — owns:</text>
<g class="mono" font-size="13" fill="#3A357A">
  <text x="624" y="166">world: W</text>
  <text x="624" y="196">mechanisms: Vec&lt;Box&lt;dyn Mechanism&gt;&gt;</text>
  <text x="624" y="226">scheduler: Box&lt;dyn Scheduler&gt;</text>
  <text x="624" y="256">rng: SimRng</text>
  <text x="624" y="286">recorder: Box&lt;dyn Recorder&gt;</text>
  <text x="624" y="316">scratch: Blackboard</text>
  <text x="624" y="346">stop_requested: bool</text>
</g>
<text class="body" x="620" y="392" font-size="11.5" fill="#6B6A64">built by SimulationBuilder (fluent; sane defaults)</text>

<!-- ownership arrows (Simulation field -> trait box) -->
<g stroke="#534AB7" stroke-width="1.3" fill="none">
  <path d="M598 160 C 470 160, 470 139, 342 139" marker-end="url(#hr)"/>
  <path d="M598 190 C 480 190, 470 219, 342 219" marker-end="url(#hr)"/>
  <path d="M598 220 C 500 240, 460 299, 342 299" marker-end="url(#hr)"/>
  <path d="M598 280 C 470 360, 470 379, 342 379" marker-end="url(#hr)"/>
</g>
<text class="body" x="468" y="92" font-size="11.5" fill="#534AB7" text-anchor="middle">owns &amp; drives</text>

<!-- StepContext -->
<rect x="120" y="466" width="760" height="86" rx="13" fill="#FBFAF6" stroke="#534AB7" stroke-width="1.4"/>
<text class="mono" x="140" y="492" font-size="14" fill="#332E6E">StepContext&lt;W&gt;  — rebuilt for every apply() call, bundles borrows:</text>
<text class="mono" x="140" y="516" font-size="12" fill="#3A357A">&amp;mut world · clock (Copy) · &amp;mut rng · &amp;mut recorder · &amp;agent_order · &amp;mut scratch · &amp;mut stop</text>
<text class="body" x="140" y="538" font-size="11.5" fill="#6B6A64">the engine constructs it from its own fields, then calls Mechanism::apply(phase, ctx)</text>
<path d="M360 466 C 412 420, 392 300, 343 235" fill="none" stroke="#534AB7" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#hr)"/>
<text class="body" x="420" y="406" font-size="11" fill="#534AB7" text-anchor="middle">passed to apply()</text>

</svg>
