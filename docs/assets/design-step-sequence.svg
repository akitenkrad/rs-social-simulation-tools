<svg width="100%" viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Anatomy of one Simulation::step()</title>
<desc>One step ticks the clock, copies it, clears the scratch blackboard, asks the scheduler for the activation order, then loops over the six phases in fixed order and, within each, over the mechanisms in insertion order, calling apply on those that registered the phase. The run loop repeats until the clock is done or a stop is requested.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="994" height="654" rx="20" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>
<text class="title" x="40" y="46" font-size="24" fill="#2C2C2A">One step: <tspan class="mono" font-size="20" fill="#534AB7">Simulation::step()</tspan></text>

<!-- step boxes -->
<g class="mono" font-size="13">
  <rect x="270" y="68"  width="460" height="38" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="290" y="92" fill="#2C2C2A"><tspan fill="#534AB7" font-weight="700">1 </tspan> world.clock.tick()   →   t += 1</text>

  <rect x="270" y="120" width="460" height="38" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="290" y="144" fill="#2C2C2A"><tspan fill="#534AB7" font-weight="700">2 </tspan> clock_snapshot = *clock   <tspan class="body" font-size="11.5" fill="#6B6A64">(Copy — no 2nd borrow on world)</tspan></text>

  <rect x="270" y="172" width="460" height="38" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="290" y="196" fill="#2C2C2A"><tspan fill="#534AB7" font-weight="700">3 </tspan> scratch.clear()   <tspan class="body" font-size="11.5" fill="#6B6A64">(drop last step's blackboard)</tspan></text>

  <rect x="270" y="224" width="460" height="38" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="290" y="248" fill="#2C2C2A"><tspan fill="#534AB7" font-weight="700">4 </tspan> order = scheduler.activation_order(world, rng)</text>
</g>
<g stroke="#534AB7" stroke-width="1.4" fill="none">
  <path d="M500 106 V120" marker-end="url(#hr)"/>
  <path d="M500 158 V172" marker-end="url(#hr)"/>
  <path d="M500 210 V224" marker-end="url(#hr)"/>
  <path d="M500 262 V276" marker-end="url(#hr)"/>
</g>

<!-- step 5: nested loop box -->
<rect x="60" y="278" width="880" height="280" rx="14" fill="#FBFAF6" stroke="#534AB7" stroke-width="1.5"/>
<text class="mono" x="80" y="304" font-size="13.5" fill="#534AB7" font-weight="700">5  for phase in Phase::ORDER  (fixed order):</text>

<!-- phase ribbon -->
<g class="body" font-size="11">
  <rect x="80"  y="316" width="130" height="28" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/><text x="145" y="334" text-anchor="middle" fill="#3C3B37">PreStep</text>
  <rect x="218" y="316" width="130" height="28" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/><text x="283" y="334" text-anchor="middle" fill="#534AB7" font-weight="600">Environment</text>
  <rect x="356" y="316" width="130" height="28" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/><text x="421" y="334" text-anchor="middle" fill="#534AB7" font-weight="600">Decision</text>
  <rect x="494" y="316" width="130" height="28" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/><text x="559" y="334" text-anchor="middle" fill="#534AB7" font-weight="600">Interaction</text>
  <rect x="632" y="316" width="130" height="28" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.1"/><text x="697" y="334" text-anchor="middle" fill="#0F6E56" font-weight="600">Reward</text>
  <rect x="770" y="316" width="130" height="28" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/><text x="835" y="334" text-anchor="middle" fill="#3C3B37">PostStep</text>
  <path d="M210 330 H218" stroke="#534AB7" stroke-width="1" marker-end="url(#hr)"/>
  <path d="M348 330 H356" stroke="#534AB7" stroke-width="1" marker-end="url(#hr)"/>
  <path d="M486 330 H494" stroke="#534AB7" stroke-width="1" marker-end="url(#hr)"/>
  <path d="M624 330 H632" stroke="#534AB7" stroke-width="1" marker-end="url(#hr)"/>
  <path d="M762 330 H770" stroke="#534AB7" stroke-width="1" marker-end="url(#hr)"/>
</g>

<!-- inner loop -->
<rect x="80" y="360" width="820" height="184" rx="11" fill="#FFFFFF" stroke="#9B98C9" stroke-width="1.2" stroke-dasharray="6 4"/>
<text class="mono" x="98" y="384" font-size="13" fill="#3A357A" font-weight="700">for mech in mechanisms   (insertion / scenario-declaration order):</text>

<rect x="110" y="398" width="780" height="34" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.9"/>
<text class="mono" x="126" y="420" font-size="12.5" fill="#2C2C2A">if mech.phases().contains(phase)   <tspan class="body" font-size="11" fill="#6B6A64">— skip mechanisms not registered for this phase</tspan></text>

<rect x="110" y="440" width="780" height="34" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text class="mono" x="126" y="462" font-size="12" fill="#332E6E">ctx = StepContext { world, clock, rng, recorder, agent_order, scratch, stop }</text>

<rect x="110" y="482" width="780" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
<text class="mono" x="126" y="503" font-size="12.5" fill="#0B5040">mech.apply(phase, &amp;mut ctx)?</text>
<text class="body" x="126" y="521" font-size="11" fill="#3C7E6C">reads/writes world · draws ctx.rng · records metrics/events · may call ctx.request_stop()</text>

<g stroke="#534AB7" stroke-width="1.3" fill="none">
  <path d="M500 432 V440" marker-end="url(#hr)"/>
  <path d="M500 474 V482" marker-end="url(#hr)"/>
</g>

<!-- step 6 -->
<path d="M500 558 V578" stroke="#534AB7" stroke-width="1.4" fill="none" marker-end="url(#hr)"/>
<rect x="200" y="580" width="600" height="56" rx="11" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
<text class="mono" x="220" y="604" font-size="13" fill="#2C2C2A"><tspan fill="#534AB7" font-weight="700">6 </tspan> return Ok(())</text>
<text class="body" x="220" y="624" font-size="11.5" fill="#6B6A64">run loop repeats step() until  clock.is_done() (t ≥ t_max)  or  stop_requested</text>

</svg>
