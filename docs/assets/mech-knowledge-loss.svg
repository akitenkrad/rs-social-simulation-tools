<svg width="100%" viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>knowledge_loss mechanism data flow</title>
<desc>PostStep-phase mechanism: reads departed_this_step tuples (theta, tenure, team), computes tacit-knowledge loss, decrements Team.knowledge_stock, then clears departed_this_step.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="334" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="442" y="45" fill="#6B6A64" text-anchor="middle">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="670" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="120" width="166" height="118" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="123" y="112" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="58" y="152" font-size="13" fill="#0B5040">departed_this_step</text>
  <text class="body" x="58" y="172" font-size="11.5" fill="#6B6A64">  → (id, θ, tenure, team)</text>
  <text class="mono" x="58" y="196" font-size="13" fill="#0B5040">Team.knowledge_stock</text>
  <text class="body" x="58" y="214" font-size="11.5" fill="#6B6A64">  (per leaver's team)</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="280" y="94" width="210" height="170" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="385" y="124" font-size="18" fill="#332E6E" text-anchor="middle">knowledge_loss</text>
  <text class="body"  x="385" y="146" font-size="12" fill="#6B6A64" text-anchor="middle">tacit knowledge drain</text>
  <line x1="298" y1="158" x2="472" y2="158" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="385" y="180" font-size="12.5" fill="#332E6E" text-anchor="middle">years = tenure / 12</text>
  <text class="mono" x="385" y="200" font-size="12.5" fill="#332E6E" text-anchor="middle">ΔK = κ·φ_tacit·|θ|·years^β</text>
  <text class="mono" x="385" y="220" font-size="12.5" fill="#332E6E" text-anchor="middle">K ← max(0, K − ΔK)</text>
  <text class="body" x="385" y="248" font-size="11" fill="#534AB7" text-anchor="middle">clears departed_this_step</text>
</g>

<!-- output state -->
<g>
  <rect x="564" y="120" width="156" height="118" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="642" y="112" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="580" y="152" font-size="13" fill="#0B5040">Team</text>
  <text class="mono" x="580" y="172" font-size="13" fill="#0B5040">  .knowledge_stock</text>
  <text class="body" x="580" y="192" font-size="11.5" fill="#6B6A64">  decremented; floored 0</text>
  <text class="mono" x="580" y="214" font-size="13" fill="#0B5040">departed_this_step</text>
  <text class="body" x="580" y="232" font-size="11.5" fill="#6B6A64">  cleared (end of step)</text>
</g>

<!-- arrows -->
<path d="M206 178 H277" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M490 178 H561" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="385" y="296" font-size="12" fill="#6B6A64" text-anchor="middle">No RNG · depends on turnover populating departed_this_step (Decision)</text>
<text class="body" x="385" y="316" font-size="11.5" fill="#9A988F" text-anchor="middle">φ_tacit=0.85 empirical · κ=0.40, β=1.0 tunable (Nonaka 1994)</text>

</svg>
