<svg width="100%" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>learning_curve mechanism data flow</title>
<desc>Environment-phase mechanism: reads each employee's theta and tenure, increments tenure, and sets productivity via pi = theta * (1 - exp(-lambda * tenure)).</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="314" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="210" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="442" y="45" fill="#6B6A64" text-anchor="middle">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="120" width="150" height="96" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="115" y="112" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="60" y="152" font-size="13.5" fill="#0B5040">Employee.theta θ</text>
  <text class="mono" x="60" y="178" font-size="13.5" fill="#0B5040">Employee.tenure</text>
  <text class="body" x="60" y="200" font-size="11.5" fill="#6B6A64">λ = lambda_learn</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="265" y="98" width="230" height="140" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="380" y="128" font-size="18" fill="#332E6E" text-anchor="middle">learning_curve</text>
  <text class="body"  x="380" y="150" font-size="12" fill="#6B6A64" text-anchor="middle">learning-by-doing</text>
  <line x1="285" y1="164" x2="475" y2="164" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="380" y="190" font-size="13" fill="#332E6E" text-anchor="middle">tenure += 1</text>
  <text class="mono" x="380" y="214" font-size="13" fill="#332E6E" text-anchor="middle">π = θ·(1 − e^(−λ·tenure))</text>
</g>

<!-- output state -->
<g>
  <rect x="570" y="120" width="150" height="96" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="645" y="112" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="588" y="152" font-size="13.5" fill="#0B5040">Employee.tenure</text>
  <text class="mono" x="588" y="178" font-size="13.5" fill="#0B5040">Employee</text>
  <text class="mono" x="588" y="196" font-size="13.5" fill="#0B5040">  .productivity π</text>
</g>

<!-- arrows -->
<path d="M190 168 H262" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M495 168 H567" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="380" y="280" font-size="12" fill="#6B6A64" text-anchor="middle">Runs once per employee each step · no RNG · order-independent</text>
<text class="body" x="380" y="300" font-size="11.5" fill="#9A988F" text-anchor="middle">Concave: productivity rises fast early in tenure, then saturates toward θ.</text>

</svg>
