<svg width="100%" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>lorenz mechanism data flow</title>
<desc>Interaction-phase mechanism: for each agent i it assimilates the mean in-region gap (alpha times the mean of diff over neighbours with |diff| &lt; epsilon) and then adds a reinforcement/polarisation term repulsion*sign(x_i)*|x_i| that amplifies extreme opinions; the new opinion x_i + delta is clamped to [-1, 1] and batch-written. Deterministic; the RNG is untouched.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="314" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="442" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="118" width="158" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="119" y="110" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="58" y="146" font-size="13" fill="#0B5040">opinion(i) = x_i</text>
  <text class="mono" x="58" y="170" font-size="12.5" fill="#0B5040">neighbors_of(i)</text>
  <text class="body" x="58" y="192" font-size="11" fill="#3C7E6C">messages m_j = x_j</text>
  <text class="mono" x="58" y="210" font-size="11.5" fill="#0B5040">diff = m_j − x_i</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="263" y="92" width="234" height="152" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="380" y="120" font-size="17" fill="#332E6E" text-anchor="middle">lorenz</text>
  <text class="body"  x="380" y="140" font-size="12" fill="#6B6A64" text-anchor="middle">assimilation + polarisation</text>
  <line x1="283" y1="152" x2="477" y2="152" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="380" y="174" font-size="11.5" fill="#332E6E" text-anchor="middle">assim = α·mean_{|diff|&lt;ε} diff</text>
  <text class="mono" x="380" y="196" font-size="11.5" fill="#332E6E" text-anchor="middle">pol = rep·sign(x_i)·|x_i|</text>
  <text class="mono" x="380" y="218" font-size="11.5" fill="#332E6E" text-anchor="middle">Δ = assim + pol · clamp[-1,1]</text>
  <text class="body" x="380" y="236" font-size="10.5" fill="#6B6A64" text-anchor="middle">extreme opinions amplified</text>
</g>

<!-- output state -->
<g>
  <rect x="562" y="118" width="158" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="641" y="110" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="580" y="150" font-size="12" fill="#0B5040">set_opinion(i, x_i+Δ)</text>
  <text class="body" x="580" y="176" font-size="11" fill="#3C7E6C">batch write-back;</text>
  <text class="body" x="580" y="192" font-size="11" fill="#3C7E6C">reinforcement pushes</text>
  <text class="body" x="580" y="208" font-size="11" fill="#3C7E6C">toward own extreme</text>
</g>

<!-- arrows -->
<path d="M198 168 H260" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M497 168 H559" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="380" y="286" font-size="11.5" fill="#6B6A64" text-anchor="middle">Synchronous update from one snapshot · deterministic (no ctx.rng) · assimilation + reinforcement/polarisation</text>

</svg>
