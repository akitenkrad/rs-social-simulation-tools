<svg width="100%" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ocb mechanism data flow</title>
<desc>Interaction-phase mechanism: reads each employee's satisfaction, po_fit, and team index, accumulates voluntary knowledge contributions, and increments Team.knowledge_stock.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="314" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="442" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="110" width="165" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="122" y="102" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="58" y="142" font-size="13" fill="#0B5040">Employee.satisfaction</text>
  <text class="mono" x="58" y="164" font-size="13" fill="#0B5040">Employee.po_fit</text>
  <text class="mono" x="58" y="186" font-size="13" fill="#0B5040">Employee.team</text>
  <text class="body" x="58" y="204" font-size="11.5" fill="#6B6A64">sorted by AgentId</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="265" y="90" width="230" height="150" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="380" y="120" font-size="18" fill="#332E6E" text-anchor="middle">ocb</text>
  <text class="body"  x="380" y="142" font-size="12" fill="#6B6A64" text-anchor="middle">citizenship behaviour</text>
  <line x1="285" y1="156" x2="475" y2="156" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="380" y="182" font-size="12.5" fill="#332E6E" text-anchor="middle">ΔK_team +=</text>
  <text class="mono" x="380" y="202" font-size="12.5" fill="#332E6E" text-anchor="middle">  α_k · satisfaction</text>
  <text class="mono" x="380" y="222" font-size="12.5" fill="#332E6E" text-anchor="middle">       · po_fit</text>
</g>

<!-- output state -->
<g>
  <rect x="570" y="110" width="150" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="645" y="102" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="588" y="142" font-size="13" fill="#0B5040">Team</text>
  <text class="mono" x="588" y="160" font-size="13" fill="#0B5040">  .knowledge_stock</text>
  <text class="body" x="588" y="182" font-size="11.5" fill="#6B6A64">+= ΔK_team</text>
</g>

<!-- arrows -->
<path d="M205 160 H262" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M495 160 H567" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="380" y="278" font-size="12" fill="#6B6A64" text-anchor="middle">No RNG · sorted by AgentId for deterministic float accumulation</text>
<text class="body" x="380" y="298" font-size="11.5" fill="#9A988F" text-anchor="middle">α_k = 0.30 (tunable) · knowledge_loss (PostStep) offsets gains from departures.</text>

</svg>
