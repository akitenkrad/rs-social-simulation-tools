<svg width="100%" viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>org_performance mechanism data flow</title>
<desc>Reward-phase mechanism: aggregates productivity, tenure, departed count, and knowledge stock into four metrics, then recomputes Team.mean_theta for the next step's peer_effect.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="354" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="442" y="45" fill="#6B6A64" text-anchor="middle">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="558" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="112" width="168" height="160" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="124" y="104" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="58" y="142" font-size="13" fill="#0B5040">Employee.productivity</text>
  <text class="mono" x="58" y="162" font-size="13" fill="#0B5040">Employee.tenure</text>
  <text class="mono" x="58" y="182" font-size="13" fill="#0B5040">Employee.theta</text>
  <text class="mono" x="58" y="202" font-size="13" fill="#0B5040">Employee.team</text>
  <text class="mono" x="58" y="222" font-size="12.5" fill="#0B5040">departed_this_step</text>
  <text class="mono" x="58" y="242" font-size="12.5" fill="#0B5040">headcount_at_step_start</text>
  <text class="mono" x="58" y="260" font-size="13" fill="#0B5040">Team.knowledge_stock</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="278" y="90" width="216" height="200" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="386" y="120" font-size="17" fill="#332E6E" text-anchor="middle">org_performance</text>
  <text class="body"  x="386" y="142" font-size="12" fill="#6B6A64" text-anchor="middle">aggregation &amp; bookkeeping</text>
  <line x1="296" y1="154" x2="476" y2="154" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="386" y="174" font-size="12" fill="#332E6E" text-anchor="middle">perf = Σ productivity</text>
  <text class="mono" x="386" y="194" font-size="11.5" fill="#332E6E" text-anchor="middle">turnover = |departed| / max(1,H)</text>
  <text class="mono" x="386" y="214" font-size="12" fill="#332E6E" text-anchor="middle">avg_tenure = mean(tenure)</text>
  <text class="mono" x="386" y="234" font-size="12" fill="#332E6E" text-anchor="middle">k_stock = Σ team.k_stock</text>
  <line x1="296" y1="248" x2="476" y2="248" stroke="#C7C2E8" stroke-width="1"/>
  <text class="body" x="386" y="268" font-size="11.5" fill="#534AB7" text-anchor="middle">recompute_team_means()</text>
  <text class="body" x="386" y="282" font-size="11" fill="#6B6A64" text-anchor="middle">→ feeds next step's peer_effect</text>
</g>

<!-- output state -->
<g>
  <rect x="562" y="112" width="158" height="160" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="641" y="104" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="578" y="142" font-size="12.5" fill="#0B5040">HrWorld</text>
  <text class="mono" x="578" y="162" font-size="12.5" fill="#0B5040">  .org_performance</text>
  <text class="mono" x="578" y="186" font-size="12.5" fill="#0B5040">Team.mean_theta</text>
  <text class="body" x="578" y="206" font-size="11.5" fill="#6B6A64">  (for next step)</text>
  <text class="body" x="578" y="230" font-size="11.5" fill="#6B6A64">records metrics:</text>
  <text class="mono" x="578" y="248" font-size="12" fill="#0B5040">  org_performance</text>
  <text class="mono" x="578" y="266" font-size="12" fill="#0B5040">  avg_tenure</text>
  <text class="mono" x="578" y="284" font-size="12" fill="#0B5040">  turnover_rate</text>
  <text class="mono" x="578" y="302" font-size="12" fill="#0B5040">  knowledge_stock</text>
</g>

<!-- arrows -->
<path d="M208 192 H275" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M494 192 H559" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="386" y="316" font-size="12" fill="#6B6A64" text-anchor="middle">No RNG · productivity summed in AgentId order for deterministic f64 accumulation</text>
<text class="body" x="386" y="336" font-size="11.5" fill="#9A988F" text-anchor="middle">Must run after turnover &amp; hiring; mean_theta recompute is the cross-step hand-off to peer_effect</text>

</svg>
