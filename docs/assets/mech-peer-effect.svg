<svg width="100%" viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" role="img">
<title>peer_effect mechanism data flow</title>
<desc>Interaction-phase mechanism: reads each employee's productivity and team index, looks up Team.mean_theta and HrWorld.base_mean_theta, and scales productivity by a peer-quality factor.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="324" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="442" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="110" width="168" height="116" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="124" y="102" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="58" y="142" font-size="13" fill="#0B5040">Employee.productivity</text>
  <text class="mono" x="58" y="164" font-size="13" fill="#0B5040">Employee.team</text>
  <text class="mono" x="58" y="186" font-size="13" fill="#0B5040">Team.mean_theta</text>
  <text class="mono" x="58" y="208" font-size="13" fill="#0B5040">HrWorld</text>
  <text class="mono" x="58" y="222" font-size="13" fill="#0B5040">  .base_mean_theta</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="265" y="90" width="230" height="160" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="380" y="120" font-size="18" fill="#332E6E" text-anchor="middle">peer_effect</text>
  <text class="body"  x="380" y="142" font-size="12" fill="#6B6A64" text-anchor="middle">peer productivity spillover</text>
  <line x1="285" y1="156" x2="475" y2="156" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="380" y="182" font-size="12.5" fill="#332E6E" text-anchor="middle">factor = team_mean_θ</text>
  <text class="mono" x="380" y="200" font-size="12.5" fill="#332E6E" text-anchor="middle">         / base_mean_θ</text>
  <text class="mono" x="380" y="224" font-size="12.5" fill="#332E6E" text-anchor="middle">π_eff = π · (1 + α_peer</text>
  <text class="mono" x="380" y="242" font-size="12.5" fill="#332E6E" text-anchor="middle">              · factor)</text>
</g>

<!-- output state -->
<g>
  <rect x="570" y="110" width="150" height="76" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="645" y="102" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="588" y="142" font-size="13" fill="#0B5040">Employee</text>
  <text class="mono" x="588" y="160" font-size="13" fill="#0B5040">  .productivity π_eff</text>
  <text class="body" x="588" y="180" font-size="11.5" fill="#6B6A64">α_peer = 0.17</text>
</g>

<!-- arrows -->
<path d="M208 168 H262" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M495 168 H567" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="380" y="286" font-size="12" fill="#6B6A64" text-anchor="middle">Runs once per employee each step · no RNG · order-independent</text>
<text class="body" x="380" y="308" font-size="11.5" fill="#9A988F" text-anchor="middle">Depends on Team.mean_theta recomputed by org_performance at prior step's Reward.</text>

</svg>
