<svg width="100%" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>policy (PolicyMechanism) data flow</title>
<desc>Decision-phase mechanism (MARL): encoder maps world state to per-agent observation, policy selects action (greedy in inference / stochastic with ctx.rng in collect), applier mutates world. Collect mode also records to TrajectoryBuffer.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="374" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="326" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="442" y="45" fill="#6B6A64" text-anchor="middle">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="112" width="168" height="130" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="124" y="104" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="body" x="58" y="142" font-size="12" fill="#6B6A64">via ObsEncoder:</text>
  <text class="mono" x="58" y="162" font-size="12.5" fill="#0B5040">world (generic W)</text>
  <text class="mono" x="58" y="182" font-size="12.5" fill="#0B5040">agent_id</text>
  <text class="body" x="58" y="206" font-size="12" fill="#6B6A64">→ Option&lt;obs&gt;</text>
  <text class="body" x="58" y="226" font-size="11.5" fill="#6B6A64">  (None skips agent)</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="278" y="90" width="216" height="218" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="386" y="118" font-size="17" fill="#332E6E" text-anchor="middle">PolicyMechanism</text>
  <text class="body"  x="386" y="138" font-size="11.5" fill="#6B6A64" text-anchor="middle">&lt;W, P, E, A&gt; · MARL (§14.1)</text>
  <line x1="296" y1="150" x2="476" y2="150" stroke="#C7C2E8" stroke-width="1"/>

  <!-- inference label -->
  <text class="body" x="386" y="170" font-size="11.5" fill="#534AB7" text-anchor="middle" font-weight="600">inference mode</text>
  <text class="mono" x="386" y="188" font-size="12" fill="#332E6E" text-anchor="middle">action ← policy.act(obs)</text>
  <text class="body" x="386" y="204" font-size="11" fill="#6B6A64" text-anchor="middle">greedy · no RNG · deterministic</text>

  <line x1="296" y1="216" x2="476" y2="216" stroke="#C7C2E8" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- collect label -->
  <text class="body" x="386" y="234" font-size="11.5" fill="#534AB7" text-anchor="middle" font-weight="600">collect mode</text>
  <text class="mono" x="386" y="252" font-size="12" fill="#332E6E" text-anchor="middle">action ← policy.sample(obs, rng)</text>
  <text class="body" x="386" y="268" font-size="11" fill="#6B6A64" text-anchor="middle">stochastic · records to buffer</text>
  <text class="body" x="386" y="284" font-size="11" fill="#6B6A64" text-anchor="middle">→ MarlTrainer (REINFORCE)</text>
</g>

<!-- RNG tag (collect mode) -->
<rect x="300" y="295" width="172" height="22" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text class="body" x="386" y="310" font-size="12" fill="#0F6E56" text-anchor="middle">🎲 ctx.rng (collect mode only)</text>

<!-- output state -->
<g>
  <rect x="562" y="112" width="160" height="130" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="642" y="104" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="body" x="578" y="142" font-size="12" fill="#6B6A64">via ActionApplier:</text>
  <text class="mono" x="578" y="162" font-size="12.5" fill="#0B5040">world (generic W)</text>
  <text class="body" x="578" y="182" font-size="11.5" fill="#6B6A64">  (any mutation)</text>
  <text class="body" x="578" y="206" font-size="12" fill="#6B6A64">collect mode also:</text>
  <text class="mono" x="578" y="224" font-size="12" fill="#0B5040">TrajectoryBuffer</text>
  <text class="body" x="578" y="242" font-size="11.5" fill="#6B6A64">  (obs, action) logged</text>
</g>

<!-- arrows -->
<path d="M208 176 H275" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M494 176 H559" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- footnote -->
<text class="body" x="386" y="338" font-size="12" fill="#6B6A64" text-anchor="middle">Library-only (socsim-marl crate, marl feature) · not in HrLifecyclePack / socsim binary</text>
<text class="body" x="386" y="358" font-size="11.5" fill="#9A988F" text-anchor="middle">Inference: bit-reproducible · Collect: ctx.rng via policy.sample per actionable agent in agent_order</text>

</svg>
