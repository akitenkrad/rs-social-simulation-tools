<svg width="100%" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>si_contagion mechanism data flow</title>
<desc>Interaction-phase mechanism: it snapshots the active (infected) set at the start of the step, then for every inactive agent draws one independent Bernoulli(beta) trial per active neighbour from ctx.rng and infects it if any trial succeeds; the newly-infected agents are batch-activated, and it requests stop on saturation. Stochastic through ctx.rng.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="314" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="94"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="156" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="210" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="272" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="326" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="388" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="442" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">Interaction</text>
  <rect x="504" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="558" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="620" y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="670" y="45" fill="#6B6A64" text-anchor="middle">PostStep</text>
</g>

<!-- input state -->
<g>
  <rect x="40" y="118" width="158" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="119" y="110" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="body" x="58" y="146" font-size="11" fill="#3C7E6C">active snapshot:</text>
  <text class="mono" x="58" y="166" font-size="12.5" fill="#0B5040">is_active(i) = false</text>
  <text class="mono" x="58" y="190" font-size="12.5" fill="#0B5040">neighbors_of(i)</text>
  <text class="body" x="58" y="210" font-size="11" fill="#3C7E6C">count active neighbours</text>
</g>

<!-- mechanism box -->
<g>
  <rect x="263" y="92" width="234" height="152" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="380" y="122" font-size="16.5" fill="#332E6E" text-anchor="middle">si_contagion</text>
  <text class="body"  x="380" y="144" font-size="12" fill="#6B6A64" text-anchor="middle">SI epidemic · synchronous</text>
  <line x1="283" y1="158" x2="477" y2="158" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="380" y="184" font-size="12.5" fill="#332E6E" text-anchor="middle">per active nb: Bernoulli(β)</text>
  <text class="mono" x="380" y="210" font-size="12.5" fill="#332E6E" text-anchor="middle">infect i if any trial succeeds</text>
  <text class="body" x="380" y="232" font-size="10.5" fill="#6B6A64" text-anchor="middle">stop on saturation</text>
</g>

<!-- output state -->
<g>
  <rect x="562" y="118" width="158" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="641" y="110" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="580" y="150" font-size="12.5" fill="#0B5040">set_active(i, true)</text>
  <text class="body" x="580" y="176" font-size="11" fill="#3C7E6C">batch-activate the</text>
  <text class="body" x="580" y="192" font-size="11" fill="#3C7E6C">newly-infected agents</text>
  <text class="body" x="580" y="210" font-size="11" fill="#3C7E6C">(synchronous round)</text>
</g>

<!-- arrows -->
<path d="M198 168 H260" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M497 168 H559" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- ctx.rng tag (one Bernoulli trial per active neighbour) -->
<g>
  <rect x="312" y="252" width="136" height="22" rx="9" fill="#FBFAF6" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="mono" x="380" y="267" font-size="11" fill="#534AB7" text-anchor="middle">ctx.rng (Bernoulli β)</text>
</g>

<!-- footnote -->
<text class="body" x="380" y="294" font-size="11.5" fill="#6B6A64" text-anchor="middle">Synchronous rounds from one snapshot · stochastic via ctx.rng · per-edge infection probability β</text>

</svg>
