<svg width="100%" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>socialization mechanism data flow</title>
<desc>PostStep-phase mechanism: for each new hire draws support from U[0.4,1.0), sets socialization as a blend of po_fit and support, and increments embeddedness; drains new_hires_this_step.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="754" height="314" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="28" width="100" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="90"  y="45" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="148" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="202" y="45" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="264" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="318" y="45" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="380" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="434" y="45" fill="#6B6A64" text-anchor="middle">Interaction</text>
  <rect x="496" y="28" width="108" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="550" y="45" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="612" y="28" width="108" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="666" y="45" fill="#534AB7" text-anchor="middle" font-weight="700">PostStep</text>
</g>

<!-- input state (reads) -->
<g>
  <rect x="24" y="98" width="166" height="114" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="107" y="90" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">reads</text>
  <text class="mono" x="38" y="124" font-size="12.5" fill="#0B5040">new_hires_this_step</text>
  <text class="mono" x="38" y="146" font-size="12.5" fill="#0B5040">Employee.po_fit</text>
  <text class="mono" x="38" y="168" font-size="12.5" fill="#0B5040">Employee.embeddedness</text>
  <text class="body" x="38" y="198" font-size="11.5" fill="#6B6A64">no params required</text>
</g>

<!-- mechanism box (center) -->
<g>
  <rect x="218" y="78" width="320" height="170" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.6"/>
  <text class="title" x="378" y="108" font-size="18" fill="#332E6E" text-anchor="middle">socialization</text>
  <text class="body"  x="378" y="128" font-size="12" fill="#6B6A64" text-anchor="middle">onboarding support blend</text>
  <line x1="238" y1="142" x2="518" y2="142" stroke="#C7C2E8" stroke-width="1"/>
  <text class="mono" x="378" y="164" font-size="12" fill="#332E6E" text-anchor="middle">support ~ U[0.4, 1.0)</text>
  <text class="mono" x="378" y="184" font-size="12" fill="#332E6E" text-anchor="middle">soc = clamp01(0.5·po_fit + 0.5·support)</text>
  <text class="mono" x="378" y="204" font-size="12" fill="#332E6E" text-anchor="middle">emb = clamp01(emb + 0.1·soc)</text>
  <text class="mono" x="378" y="228" font-size="12.5" fill="#534AB7" text-anchor="middle" font-weight="700">drain new_hires_this_step</text>
</g>

<!-- output state (writes) -->
<g>
  <rect x="566" y="98" width="166" height="114" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text class="body" x="649" y="90" font-size="13" fill="#0F6E56" text-anchor="middle" font-weight="600">writes</text>
  <text class="mono" x="578" y="124" font-size="12.5" fill="#0B5040">Employee.socialization</text>
  <text class="mono" x="578" y="146" font-size="12.5" fill="#0B5040">Employee.embeddedness</text>
  <text class="mono" x="578" y="168" font-size="12.5" fill="#0B5040">  (+= 0.1·soc, clamped)</text>
  <text class="mono" x="578" y="190" font-size="12.5" fill="#0B5040">new_hires_this_step</text>
  <text class="mono" x="578" y="208" font-size="12.5" fill="#0B5040">  (cleared)</text>
</g>

<!-- arrows -->
<path d="M190 155 H215" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>
<path d="M538 155 H563" stroke="#534AB7" stroke-width="1.6" marker-end="url(#hr)"/>

<!-- RNG tag -->
<rect x="296" y="270" width="130" height="26" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.1"/>
<text class="body" x="361" y="288" font-size="13" fill="#0F6E56" text-anchor="middle">🎲 ctx.rng</text>

<!-- footnote -->
<text class="body" x="378" y="304" font-size="12" fill="#6B6A64" text-anchor="middle">Runs once per new hire · depends on hiring (Decision) having populated new_hires_this_step</text>

</svg>
