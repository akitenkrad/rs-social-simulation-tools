<svg width="100%" viewBox="0 0 1040 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>socsim mechanisms across the 6-phase tick loop</title>
<desc>The eleven documented mechanisms placed in the phase(s) they fire in: PreStep, Environment, Decision, Interaction, Reward, PostStep. Arrows show the fixed per-step phase order; the curved arrow closes the loop for the next step.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
  </style>
</defs>

<rect x="3" y="3" width="1034" height="554" rx="20" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<text class="title" x="40" y="48" font-size="26" fill="#2C2C2A">Mechanisms across the 6-phase tick loop</text>
<text class="body"  x="40" y="74" font-size="14" fill="#6B6A64">Each mechanism declares the phase(s) it fires in. Within a phase, mechanisms run in scenario/insertion order.</text>

<!-- phase header band -->
<g>
  <!-- 6 columns: x = 40 + i*160, width 150 -->
  <!-- PreStep -->
  <rect x="40"  y="100" width="150" height="34" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text class="body" x="115" y="122" font-size="14.5" font-weight="600" fill="#444441" text-anchor="middle">PreStep</text>
  <!-- Environment -->
  <rect x="200" y="100" width="150" height="34" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/>
  <text class="body" x="275" y="122" font-size="14.5" font-weight="700" fill="#534AB7" text-anchor="middle">Environment</text>
  <!-- Decision -->
  <rect x="360" y="100" width="150" height="34" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/>
  <text class="body" x="435" y="122" font-size="14.5" font-weight="700" fill="#534AB7" text-anchor="middle">Decision</text>
  <!-- Interaction -->
  <rect x="520" y="100" width="150" height="34" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/>
  <text class="body" x="595" y="122" font-size="14.5" font-weight="700" fill="#534AB7" text-anchor="middle">Interaction</text>
  <!-- Reward -->
  <rect x="680" y="100" width="150" height="34" rx="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.1"/>
  <text class="body" x="755" y="122" font-size="14.5" font-weight="700" fill="#0F6E56" text-anchor="middle">Reward</text>
  <!-- PostStep -->
  <rect x="840" y="100" width="150" height="34" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text class="body" x="915" y="122" font-size="14.5" font-weight="600" fill="#444441" text-anchor="middle">PostStep</text>

  <!-- phase order arrows -->
  <path d="M190 117 H200" stroke="#534AB7" stroke-width="1.4" marker-end="url(#hr)"/>
  <path d="M350 117 H360" stroke="#534AB7" stroke-width="1.4" marker-end="url(#hr)"/>
  <path d="M510 117 H520" stroke="#534AB7" stroke-width="1.4" marker-end="url(#hr)"/>
  <path d="M670 117 H680" stroke="#534AB7" stroke-width="1.4" marker-end="url(#hr)"/>
  <path d="M830 117 H840" stroke="#534AB7" stroke-width="1.4" marker-end="url(#hr)"/>
</g>

<!-- mechanism chips, stacked under each phase column -->
<!-- helper chip size: w 150, h 38, gap 10 -->
<g class="body" font-size="13.5">
  <!-- PreStep column -->
  <rect x="40" y="160" width="150" height="38" rx="9" fill="#FBFAF6" stroke="#C9C6BC" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="115" y="184" fill="#9A988F" text-anchor="middle" font-style="italic">(MARL: turnover_prep)</text>

  <!-- Environment column -->
  <rect x="200" y="160" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="275" y="184" fill="#332E6E" text-anchor="middle" font-weight="600">learning_curve</text>

  <!-- Decision column -->
  <rect x="360" y="160" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="435" y="184" fill="#332E6E" text-anchor="middle" font-weight="600">fit</text>
  <rect x="360" y="208" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="435" y="232" fill="#332E6E" text-anchor="middle" font-weight="600">turnover</text>
  <rect x="360" y="256" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="435" y="280" fill="#332E6E" text-anchor="middle" font-weight="600">hiring</text>
  <rect x="360" y="304" width="150" height="38" rx="9" fill="#EFEAFB" stroke="#7A5BC0" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="435" y="328" fill="#5B3E9E" text-anchor="middle" font-weight="600">policy  (MARL)</text>

  <!-- Interaction column -->
  <rect x="520" y="160" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="595" y="184" fill="#332E6E" text-anchor="middle" font-weight="600">peer_effect</text>
  <rect x="520" y="208" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="595" y="232" fill="#332E6E" text-anchor="middle" font-weight="600">ocb</text>
  <rect x="520" y="256" width="150" height="38" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="595" y="280" fill="#332E6E" text-anchor="middle" font-weight="600">toxic_spread</text>

  <!-- Reward column -->
  <rect x="680" y="160" width="150" height="38" rx="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="755" y="184" fill="#0B5040" text-anchor="middle" font-weight="600">org_performance</text>

  <!-- PostStep column -->
  <rect x="840" y="160" width="150" height="38" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
  <text x="915" y="184" fill="#3C3B37" text-anchor="middle" font-weight="600">knowledge_loss</text>
  <rect x="840" y="208" width="150" height="38" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
  <text x="915" y="232" fill="#3C3B37" text-anchor="middle" font-weight="600">socialization</text>
</g>

<!-- shared-state hand-offs -->
<g font-size="12" class="body" fill="#0F6E56">
  <!-- turnover -> knowledge_loss via departed_this_step -->
  <path d="M510 227 C 700 380, 760 380, 905 246" fill="none" stroke="#0F6E56" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#hr)"/>
  <text x="690" y="398" text-anchor="middle">turnover → knowledge_loss  (departed_this_step)</text>
  <!-- hiring -> socialization via new_hires_this_step -->
  <path d="M510 275 C 700 450, 770 450, 905 227" fill="none" stroke="#0F6E56" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#hr)"/>
  <text x="700" y="468" text-anchor="middle">hiring → socialization  (new_hires_this_step)</text>
</g>

<!-- org_performance recompute team means -> next step peer_effect -->
<g font-size="12" class="body" fill="#534AB7">
  <path d="M680 179 C 600 120, 660 120, 595 154" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#hr)"/>
</g>

<!-- loop-back arrow PostStep -> PreStep (next step) -->
<path d="M915 246 C 915 510, 115 510, 115 204" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-dasharray="2 4" marker-end="url(#hr)"/>
<text class="body" x="515" y="528" font-size="13" fill="#6B6A64" text-anchor="middle">next step  ·  clock.tick()  ·  recompute_team_means feeds next Interaction</text>

</svg>
