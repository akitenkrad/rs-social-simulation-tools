<svg width="100%" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>hr-lifecycle pack — ten mechanisms across the 6-phase tick loop</title>
<desc>The hr-lifecycle pack composes ten mechanisms over the fixed 6-phase order PreStep, Environment, Decision, Interaction, Reward, PostStep. learning_curve feeds productivity to peer_effect; turnover populates departed_this_step and headcount_at_step_start, consumed by knowledge_loss and org_performance; hiring populates new_hires_this_step, consumed by socialization.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="hr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ho" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="994" height="554" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<text class="title" x="500" y="32" font-size="16" fill="#332E6E" text-anchor="middle">hr-lifecycle — ten mechanisms over the fixed 6-phase tick loop</text>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="30"  y="50" width="148" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="104" y="67" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="186" y="50" width="148" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="260" y="67" fill="#534AB7" text-anchor="middle" font-weight="700">Environment</text>
  <rect x="342" y="50" width="148" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="416" y="67" fill="#534AB7" text-anchor="middle" font-weight="700">Decision</text>
  <rect x="498" y="50" width="148" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="572" y="67" fill="#534AB7" text-anchor="middle" font-weight="700">Interaction</text>
  <rect x="654" y="50" width="148" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="728" y="67" fill="#534AB7" text-anchor="middle" font-weight="700">Reward</text>
  <rect x="810" y="50" width="160" height="26" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
  <text x="890" y="67" fill="#534AB7" text-anchor="middle" font-weight="700">PostStep</text>
</g>
<text class="body" x="104" y="98" font-size="10.5" fill="#9A988F" text-anchor="middle">(unused)</text>

<!-- mechanism boxes -->
<g class="body" font-size="12.5" text-anchor="middle">
  <!-- Environment -->
  <rect x="190" y="92" width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="260" y="116" fill="#332E6E">learning_curve</text>

  <!-- Decision -->
  <rect x="346" y="92"  width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="416" y="116" fill="#332E6E">fit</text>
  <rect x="346" y="142" width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="416" y="166" fill="#332E6E">turnover</text>
  <rect x="346" y="192" width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="416" y="216" fill="#332E6E">hiring</text>

  <!-- Interaction -->
  <rect x="502" y="92"  width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="572" y="116" fill="#332E6E">peer_effect</text>
  <rect x="502" y="142" width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="572" y="166" fill="#332E6E">ocb</text>
  <rect x="502" y="192" width="140" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="572" y="216" fill="#332E6E">toxic_spread</text>

  <!-- Reward -->
  <rect x="658" y="92" width="140" height="62" rx="10" fill="#534AB7" stroke="#332E6E" stroke-width="1.4"/>
  <text class="mono" x="728" y="116" fill="#FBFAF6">org_performance</text>
  <text class="body" x="728" y="136" font-size="10.5" fill="#D8D4F4">records step metrics</text>

  <!-- PostStep -->
  <rect x="814" y="92"  width="152" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="890" y="116" fill="#332E6E">knowledge_loss</text>
  <rect x="814" y="142" width="152" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text class="mono" x="890" y="166" fill="#332E6E">socialization</text>
</g>

<!-- intra-phase order arrows (Decision, Interaction) -->
<path d="M416 132 V142" stroke="#C7C2E8" stroke-width="1.4" marker-end="url(#hr)"/>
<path d="M416 182 V192" stroke="#C7C2E8" stroke-width="1.4" marker-end="url(#hr)"/>
<path d="M572 132 V142" stroke="#C7C2E8" stroke-width="1.4" marker-end="url(#hr)"/>
<path d="M572 182 V192" stroke="#C7C2E8" stroke-width="1.4" marker-end="url(#hr)"/>

<!-- shared-state hand-offs (green dashed) -->
<g class="body" font-size="11" fill="#0B5040">
  <!-- productivity: learning_curve -> peer_effect -->
  <path d="M260 132 C 260 270, 572 270, 572 132" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ho)"/>
  <rect x="372" y="258" width="96" height="22" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="mono" x="420" y="273" text-anchor="middle" font-size="10.5">productivity</text>

  <!-- new_hires_this_step: hiring -> socialization -->
  <path d="M416 232 C 416 330, 890 330, 890 182" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ho)"/>
  <rect x="600" y="318" width="160" height="22" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="mono" x="680" y="333" text-anchor="middle" font-size="10.5">new_hires_this_step</text>

  <!-- departed_this_step + headcount: turnover -> org_performance & knowledge_loss -->
  <path d="M416 182 C 416 420, 728 420, 728 154" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ho)"/>
  <path d="M460 405 C 700 405, 890 405, 890 182" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ho)"/>
  <rect x="296" y="394" width="170" height="22" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="mono" x="381" y="409" text-anchor="middle" font-size="10.5">departed_this_step</text>
  <rect x="296" y="420" width="200" height="22" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="mono" x="396" y="435" text-anchor="middle" font-size="10.5">headcount_at_step_start</text>
</g>

<!-- metrics output -->
<g>
  <rect x="640" y="470" width="320" height="64" rx="12" fill="#FBFAF6" stroke="#534AB7" stroke-width="1.3"/>
  <text class="body" x="800" y="490" font-size="12" fill="#534AB7" text-anchor="middle" font-weight="700">recorded metrics (per step)</text>
  <text class="mono" x="800" y="510" font-size="11" fill="#332E6E" text-anchor="middle">org_performance · avg_tenure</text>
  <text class="mono" x="800" y="526" font-size="11" fill="#332E6E" text-anchor="middle">turnover_rate · knowledge_stock</text>
</g>
<path d="M728 154 C 728 300, 800 320, 800 470" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#hr)"/>

<!-- legend -->
<g class="body" font-size="11" fill="#6B6A64">
  <rect x="40" y="478" width="20" height="14" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="68" y="490">mechanism</text>
  <line x1="44" y1="512" x2="62" y2="512" stroke="#0F6E56" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="68" y="516">shared-state hand-off</text>
</g>

</svg>
