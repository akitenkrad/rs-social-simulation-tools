<svg width="100%" viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg" role="img">
<title>opinion-dynamics pack — mechanism pipeline</title>
<desc>One opinion mechanism (Hegselmann-Krause, Deffuant, Social Judgement, or Lorenz) runs in the Interaction phase; in PostStep, convergence checks the stopping tolerance and opinion_metrics records clusters, variance, spread, mean and max_delta.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F6F4EE"/>
    <stop offset="1" stop-color="#ECEAE2"/>
  </linearGradient>
  <marker id="gn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-weight: 700; }
    .body  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; }
    .mono  { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
</defs>

<rect x="3" y="3" width="914" height="424" rx="18" fill="url(#bg)" stroke="#D9D6CC" stroke-width="1.5"/>

<text class="title" x="460" y="34" font-size="16" fill="#0F6E56" text-anchor="middle">opinion-dynamics — mechanism pipeline (one step)</text>

<!-- phase strip -->
<g class="body" font-size="11.5">
  <rect x="40"  y="54" width="120" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="100" y="71" fill="#6B6A64" text-anchor="middle">PreStep</text>
  <rect x="168" y="54" width="120" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="228" y="71" fill="#6B6A64" text-anchor="middle">Environment</text>
  <rect x="296" y="54" width="120" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="356" y="71" fill="#6B6A64" text-anchor="middle">Decision</text>
  <rect x="424" y="54" width="180" height="26" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text x="514" y="71" fill="#0F6E56" text-anchor="middle" font-weight="700">Interaction</text>
  <rect x="612" y="54" width="120" height="26" rx="7" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="672" y="71" fill="#6B6A64" text-anchor="middle">Reward</text>
  <rect x="740" y="54" width="140" height="26" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.3"/>
  <text x="810" y="71" fill="#0F6E56" text-anchor="middle" font-weight="700">PostStep</text>
</g>

<!-- interaction: choose-one opinion mechanism -->
<rect x="416" y="100" width="196" height="184" rx="13" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.4"/>
<text class="body" x="514" y="122" font-size="12" fill="#0F6E56" text-anchor="middle" font-weight="700">opinion update</text>
<text class="body" x="514" y="138" font-size="10" fill="#3C7E6C" text-anchor="middle">(enable one or more)</text>
<g class="mono" font-size="12" fill="#0B5040" text-anchor="middle">
  <rect x="432" y="148" width="164" height="28" rx="8" fill="#FBFAF6" stroke="#0F6E56" stroke-width="1"/>
  <text x="514" y="167">hegselmann_krause</text>
  <rect x="432" y="180" width="164" height="28" rx="8" fill="#FBFAF6" stroke="#0F6E56" stroke-width="1"/>
  <text x="514" y="199">deffuant</text>
  <rect x="432" y="212" width="164" height="28" rx="8" fill="#FBFAF6" stroke="#0F6E56" stroke-width="1"/>
  <text x="514" y="231">social_judgement</text>
  <rect x="432" y="244" width="164" height="28" rx="8" fill="#FBFAF6" stroke="#0F6E56" stroke-width="1"/>
  <text x="514" y="263">lorenz</text>
</g>

<!-- input opinions (left) -->
<rect x="40" y="120" width="150" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
<text class="body" x="115" y="142" font-size="12" fill="#534AB7" text-anchor="middle" font-weight="600">OpinionWorld</text>
<text class="mono" x="56" y="168" font-size="11.5" fill="#332E6E">opinions: Vec&lt;f64&gt;</text>
<text class="mono" x="56" y="190" font-size="11.5" fill="#332E6E">net: SocialNetwork</text>
<text class="body" x="56" y="214" font-size="10.5" fill="#6B6A64">read via ScalarOpinions</text>
<text class="body" x="56" y="230" font-size="10.5" fill="#6B6A64">+ Neighbors traits</text>
<path d="M190 180 H414" stroke="#0F6E56" stroke-width="1.6" marker-end="url(#gn)"/>
<text class="body" x="300" y="172" font-size="10" fill="#0F6E56" text-anchor="middle">opinions within ε attract</text>

<!-- PostStep: convergence + metrics -->
<rect x="734" y="100" width="152" height="84" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.3"/>
<text class="mono" x="810" y="122" font-size="12" fill="#332E6E" text-anchor="middle">convergence</text>
<text class="body" x="810" y="142" font-size="10.5" fill="#6B6A64" text-anchor="middle">stop when</text>
<text class="mono" x="810" y="160" font-size="11" fill="#332E6E" text-anchor="middle">max|Δx| &lt; tol</text>

<rect x="734" y="196" width="152" height="120" rx="12" fill="#534AB7" stroke="#332E6E" stroke-width="1.3"/>
<text class="mono" x="810" y="218" font-size="12" fill="#FBFAF6" text-anchor="middle">opinion_metrics</text>
<g class="mono" font-size="11" fill="#E1E0F8" text-anchor="middle">
  <text x="810" y="240">clusters</text>
  <text x="810" y="258">variance · spread</text>
  <text x="810" y="276">mean · max_delta</text>
</g>
<text class="body" x="810" y="300" font-size="9.5" fill="#D8D4F4" text-anchor="middle">socsim-metrics::stats</text>

<path d="M612 180 C 670 180, 690 142, 732 142" fill="none" stroke="#0F6E56" stroke-width="1.6" marker-end="url(#gn)"/>
<path d="M612 230 C 680 230, 700 256, 732 256" fill="none" stroke="#0F6E56" stroke-width="1.6" marker-end="url(#gn)"/>

<!-- next-step loop -->
<path d="M810 316 C 810 360, 115 360, 115 240" fill="none" stroke="#9A988F" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#gn)"/>
<text class="body" x="460" y="356" font-size="10.5" fill="#6B6A64" text-anchor="middle">next step (until convergence or t_max)</text>

</svg>
